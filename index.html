<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iOS Privacy Screen Beta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap');
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background-color: #0c0d10;
            color: #000000;
            margin: 0; padding: 0;
            user-select: none;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 100%;
            max-width: 430px;
            background-color: #FAF9F6;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            padding-bottom: 30px;
        }

        .mockup-phone {
            width: 190px;
            height: 340px;
            /* الخلفية ديال iOS الجديد */
            background: linear-gradient(135deg, #1e3a8a, #7e22ce, #c2410c);
            border: 10px solid #4a4a4a;
            border-radius: 32px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            margin: 0 auto;
        }

        .mockup-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 18px;
            background-color: #4a4a4a;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            z-index: 40;
        }

        .privacy-lens {
            position: absolute;
            inset: 0;
            background-color: #000000;
            opacity: 0;
            pointer-events: none;
            z-index: 30;
            transition: opacity 0.08s ease-out;
        }

        .btn-demo {
            background-color: #111111;
            color: #ffffff;
            font-weight: 600;
            font-size: 16px;
            padding: 16px;
            border-radius: 9999px;
            width: 90%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.3);
        }
        .btn-demo:active {
            transform: scale(0.96);
            background-color: #222222;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="phone-container flex flex-col justify-between">
        
        <div>
            <div class="flex justify-between items-center px-6 pt-3 text-[14px] font-medium text-black">
                <span>1:48</span>
                <div class="flex items-center gap-1">
                    <i class="ri-signal-tower-fill"></i>
                    <i class="ri-wifi-line"></i>
                    <i class="ri-battery-fill text-lg"></i>
                </div>
            </div>

            <div class="flex justify-between items-center px-6 mt-4">
                <button class="text-black text-xl"><i class="ri-arrow-left-s-line text-2xl"></i></button>
                <span class="font-medium text-[16px] text-[#444]">Privacy Screen</span>
                <button class="bg-[#1c1c1e] text-white text-[13px] font-semibold px-4 py-1.5 rounded-full">Edit</button>
            </div>

            <div class="text-center px-4 mt-6">
                <h2 class="text-[25px] font-bold leading-tight tracking-tight text-[#111]">
                    Discover how to enable<br>privacy screen feature<br>on iPhone
                </h2>
            </div>
        </div>

        <div class="my-6">
            <div class="mockup-phone">
                <div class="mockup-notch"></div>
                <div class="privacy-lens" id="innerLens"></div>
                
                <div class="absolute top-1.5 inset-x-0 px-3 flex justify-between items-center text-white z-20 font-semibold opacity-90">
                    <span class="text-[9px] ml-1">1:48</span>
                    <div class="flex items-center gap-[2px]">
                        <i class="ri-signal-tower-fill text-[9px]"></i>
                        <i class="ri-wifi-line text-[10px]"></i>
                        <i class="ri-battery-fill text-[11px]"></i>
                    </div>
                </div>
            </div>
        </div>

        <div>
            <div class="px-8 text-left">
                <div class="flex items-center gap-2 mb-2">
                    <h3 class="text-[21px] font-bold text-black">Privacy Screen</h3>
                    <span class="bg-[#E9E9EB] text-[#555] text-[10px] font-bold px-2 py-0.5 rounded-md uppercase tracking-wider">Beta</span>
                </div>
                <p class="text-[14px] text-gray-500 leading-relaxed font-normal">
                    Helps keep your screen private by reducing side visibility while keeping the center view clear when the phone is held straight.
                </p>
                <p class="text-[12px] text-gray-400 mt-4 italic">
                    Start the demo to test the full-screen privacy effect.
                </p>
            </div>

            <div class="mt-8 mb-6 text-center">
                <button class="btn-demo" id="startDemoBtn">
                    Start Demo
                </button>
            </div>
        </div>

    </div>

    <script>
        const startDemoBtn = document.getElementById('startDemoBtn');
        const innerLens = document.getElementById('innerLens');
        
        let isDemoActive = false;

        startDemoBtn.addEventListener('click', () => {
            if (!isDemoActive) {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                activatePrivacyEngine();
                            } else {
                                alert("Permission denied! Sensor access is required for Parallax.");
                            }
                        })
                        .catch(console.error);
                } else {
                    activatePrivacyEngine();
                }
            } else {
                deactivatePrivacyEngine();
            }
        });

        function activatePrivacyEngine() {
            isDemoActive = true;
            startDemoBtn.textContent = "Stop Demo";
            startDemoBtn.style.backgroundColor = "#FF3B30";
            window.addEventListener('deviceorientation', processOrientation);
        }

        function deactivatePrivacyEngine() {
            isDemoActive = false;
            startDemoBtn.textContent = "Start Demo";
            startDemoBtn.style.backgroundColor = "#111111";
            window.removeEventListener('deviceorientation', processOrientation);
            innerLens.style.opacity = 0;
        }

        function processOrientation(event) {
            if (!isDemoActive) return;

            let tiltX = event.gamma; 
            let absoluteTilt = Math.abs(tiltX);

            let opacity = 0;
            if (absoluteTilt > 8) {
                opacity = (absoluteTilt - 8) / 22; 
            }

            if (opacity > 0.98) opacity = 0.98; 
            
            innerLens.style.opacity = opacity;
        }
    </script>
</body>
</html>
